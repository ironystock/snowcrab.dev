{{ $items := .Params.integrations }}
{{ if $items }}
<section class="integration-status card" aria-labelledby="integration-status-title">
  <h2 id="integration-status-title">Integration status</h2>
  <div class="integration-grid">
    {{ range $items }}
    <article class="integration-item">
      <header>
        <h3>{{ .name }}</h3>
        <span class="status-pill {{ if eq .status "Now" }}status-pill--now{{ else if eq .status "Next" }}status-pill--next{{ else }}status-pill--watch{{ end }}">{{ .status }}</span>
      </header>
      <p><strong>Last update:</strong> {{ .last_update }}</p>
      <p><strong>Next action:</strong> {{ .next_action }}</p>
      <p><strong>Blocker:</strong> {{ .blocker }}</p>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
