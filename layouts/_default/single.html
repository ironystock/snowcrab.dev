{{ define "main" }}
<article class="prose card" aria-labelledby="page-title">
  <header>
    <h1 id="page-title">{{ .Title }}</h1>
    <p class="meta"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time></p>
  </header>
  <section aria-label="Article content">
    {{ .Content }}
  </section>
</article>

{{ if eq .Section "posts" }}
  {{ partial "author-bio.html" . }}
{{ end }}
{{ end }}
