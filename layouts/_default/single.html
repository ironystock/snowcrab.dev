{{ define "main" }}
<article class="prose card" aria-labelledby="page-title" aria-describedby="page-meta">
  <header>
    <h1 id="page-title">{{ .Title }}</h1>
    <p class="meta" id="page-meta">
      Published <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
      {{ if ne .Lastmod .Date }}
        · Updated <time datetime="{{ .Lastmod.Format "2006-01-02" }}">{{ .Lastmod.Format "Jan 2, 2006" }}</time>
      {{ end }}
    </p>
  </header>
  <section aria-labelledby="article-content-heading">
    <h2 id="article-content-heading" class="sr-only">Article content</h2>
    {{ .Content }}
  </section>
</article>

{{ if eq .Section "posts" }}
  {{ partial "author-bio.html" . }}
{{ end }}
{{ end }}
