{{ define "main" }}
<section class="hero">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}<div class="muted">{{ . }}</div>{{ end }}
</section>

<section class="stack">
  {{ range .Pages.ByDate.Reverse }}
    <article class="card">
      <div class="meta">{{ .Date.Format "Jan 2, 2006" }}</div>
      <h2><a href="{{ .RelPermalink }}">{{ .Title | default .Slug }}</a></h2>
      {{ with .Summary }}<p class="muted">{{ . }}</p>{{ end }}
    </article>
  {{ else }}
    <p class="muted">Nothing published yet.</p>
  {{ end }}
</section>
{{ end }}
