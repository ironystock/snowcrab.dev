name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.140.2'
          extended: true

      - name: Build
        run: hugo --gc --minify

      # NOTE: Link checker temporarily disabled due upstream install/action issues.
      # We'll re-enable once we pin a known-good binary/action path.
