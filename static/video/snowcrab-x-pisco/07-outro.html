<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html,body{margin:0;width:100%;height:100%;font-family:Inter,Segoe UI,Arial,sans-serif;background:#060b16;color:#eaf6ff;overflow:hidden}
.wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.bg{position:absolute;inset:0;background:radial-gradient(1200px 600px at 80% 20%,rgba(0,212,255,.16),transparent 60%),radial-gradient(900px 500px at 10% 90%,rgba(0,255,170,.12),transparent 60%),linear-gradient(140deg,#060b16,#091428 60%,#0d1b33)}
.card{position:relative;width:min(1400px,88vw);padding:56px 72px;border:2px solid rgba(0,212,255,.45);border-radius:24px;background:rgba(8,14,28,.78);box-shadow:0 24px 80px rgba(0,0,0,.45)}
.kicker{font-size:24px;letter-spacing:.08em;text-transform:uppercase;color:#7ce6ff;margin-bottom:18px;font-weight:800}
.h1{font-size:68px;line-height:1.05;margin:0 0 18px;font-weight:900}
.h2{font-size:38px;line-height:1.2;margin:0;color:#b8d9ff;font-weight:700}
.bar{margin-top:34px;height:8px;border-radius:10px;background:linear-gradient(90deg,#00d4ff,#7c8cff,#00ffbf)}
.badge{position:absolute;top:22px;right:26px;background:#0e203f;border:1px solid rgba(124,230,255,.4);padding:8px 12px;border-radius:999px;font-size:16px;color:#9de8ff}
</style></head><body><div class="wrap"><div class="bg"></div><div class="card"><div class="badge">snowcrab.dev</div><div class="kicker">Builders Support Builders</div><h1 class="h1">Snowcrab × Pisco</h1><h2 class="h2">Share your before/after compress stats</h2><div class="bar"></div></div></div></body></html>
