name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.140.2'
          extended: true

      - name: Build
        run: hugo --gc --minify --cleanDestinationDir --environment production

      - name: Performance budget guardrails
        run: node scripts/check-performance-budgets.mjs

      # Link checking intentionally disabled for now.
      # CI gate is Hugo build + performance budget guardrails.
