<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--accent:#00d4ff;--accent2:#7c8cff;--ok:#00ffbf;--text:#eaf6ff;--muted:#b6cfff;--bg:#060b16}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.wrap{position:relative;width:100%;height:100%;padding:32px}
.bg{position:absolute;inset:0;background:radial-gradient(1200px 600px at 80% 20%,rgba(0,212,255,.16),transparent 60%),radial-gradient(900px 500px at 10% 90%,rgba(0,255,170,.12),transparent 60%),linear-gradient(140deg,#060b16,#091428 60%,#0d1b33)}
.layout{position:relative;display:grid;grid-template-rows:34% 66%;height:100%;gap:18px}
.top{border:2px solid rgba(0,212,255,.45);border-radius:20px;background:rgba(8,14,28,.82);padding:22px 28px;position:relative;overflow:hidden}
.kicker{font-size:19px;letter-spacing:.08em;text-transform:uppercase;color:#7ce6ff;font-weight:800;margin-bottom:8px}
.h1{font-size:52px;line-height:1.08;margin:0 0 6px;font-weight:900}
.h2{font-size:24px;margin:0;color:var(--muted);font-weight:650}
.progress-wrap{position:absolute;left:0;top:0;width:100%;height:7px;background:rgba(255,255,255,.08)}
.progress{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--ok));animation:fill var(--dur)s linear forwards}
@keyframes fill{from{width:0}to{width:100%}}
.bot{border:2px solid rgba(0,212,255,.30);border-radius:20px;background:rgba(8,14,28,.74);padding:20px 24px}
.grid.two{display:grid;grid-template-columns:1fr 1fr;gap:16px;height:100%}
.panel{border:1px solid rgba(124,230,255,.28);border-radius:14px;padding:16px;background:rgba(12,22,42,.62)}
.panel h3{margin:0 0 10px;font-size:24px;color:#9de8ff}
.panel p,.panel li{font-size:22px;line-height:1.35;color:#e9f5ff}
ul{margin:0;padding-left:22px}
.term pre{margin:0;font-size:21px;line-height:1.35;color:#9fffb9;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.bars>div{display:flex;align-items:center;gap:12px;margin:12px 0}
.bars span{width:220px;font-size:20px;color:#cce6ff}
.bars i{display:block;height:16px;border-radius:999px;background:linear-gradient(90deg,#00d4ff,#00ffbf);width:var(--w)}
.chat .bubble{padding:12px 14px;border-radius:12px;margin:10px 0;font-size:20px;line-height:1.35}
.chat .user{background:rgba(124,140,255,.24);border:1px solid rgba(124,140,255,.5)}
.chat .bot{background:rgba(0,255,191,.16);border:1px solid rgba(0,255,191,.5)}
.badge{position:absolute;right:18px;bottom:12px;font-size:14px;color:#95c9ff}
</style></head><body><div class="wrap"><div class="bg"></div><div class="layout"><section class="top"><div class="progress-wrap"><div class="progress"></div></div><div class="kicker">Step 4 — Why v0.1.1</div><h1 class="h1">Safety upgrades for real workflows</h1><p class="h2">Fidelity improved where it matters most</p><div class="badge">snowcrab.dev • SXPC</div></section><section class="bot"><div class="grid two"><div class="panel"><h3>Key changes</h3><ul><li><code>read</code> compression disabled</li><li><code>web_fetch</code> thresholds increased</li><li>More source context preserved</li></ul></div><div class="panel"><h3>Impact sketch</h3><div class="bars"><div><span>Read fidelity</span><i style="--w:92%"></i></div><div><span>Context retention</span><i style="--w:88%"></i></div><div><span>Risk reduction</span><i style="--w:85%"></i></div></div></div></div></section></div></div></body></html>
