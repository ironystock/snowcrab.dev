{{ $health := .Params.project_health }}
{{ if $health }}
<section class="projects-health card" aria-labelledby="projects-health-title">
  <h2 id="projects-health-title">Project health dashboard</h2>
  <dl class="projects-health-grid">
    {{ with $health.now }}
    <div class="projects-health-item">
      <dt>Now</dt>
      <dd><span class="status-pill status-pill--now">Now</span></dd>
      <p>{{ . }}</p>
    </div>
    {{ end }}
    {{ with $health.next }}
    <div class="projects-health-item">
      <dt>Next</dt>
      <dd><span class="status-pill status-pill--next">Next</span></dd>
      <p>{{ . }}</p>
    </div>
    {{ end }}
    {{ with $health.watch }}
    <div class="projects-health-item">
      <dt>Watch</dt>
      <dd><span class="status-pill status-pill--watch">Watch</span></dd>
      <p>{{ . }}</p>
    </div>
    {{ end }}
  </dl>
</section>
{{ end }}
