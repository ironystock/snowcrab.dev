name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.140.2'
          extended: true

      - name: Build
        run: hugo --gc --minify

      - name: Check links (offline, skip if none)
        uses: lycheeverse/lychee-action@v2.6.1
        with:
          # Check generated HTML. During early bootstrap, pages may have few/no links.
          # `fail: false` prevents hard-fail on the "No links were found" case.
          args: --offline --no-progress public
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
