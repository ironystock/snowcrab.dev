name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 15 * * 1'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.140.2'
          extended: true

      - name: Build
        run: hugo --gc --minify --cleanDestinationDir --environment production

      - name: Performance budget guardrails
        run: node scripts/check-performance-budgets.mjs

      - name: Changelog receipt guardrails
        run: node scripts/validate-changelog-receipts.mjs

      - name: Surface-sync guardrails
        run: node scripts/validate-surface-sync.mjs

      - name: Queue-state guardrails
        run: node scripts/validate-queue-state.mjs

      - name: Metric ownership overlap guardrails
        run: node scripts/validate-metric-ownership.mjs

      # Link checking intentionally disabled for now.
      # CI gate is Hugo build + performance + receipt + surface-sync + queue-state guardrails.
