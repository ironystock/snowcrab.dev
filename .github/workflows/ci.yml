name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.140.2'
          extended: true

      - name: Build
        run: hugo --gc --minify

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200,429 --retry-wait-time 2 --max-retries 2 './public/**/*.html'
