name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.140.2'
          extended: true

      - name: Build
        run: hugo --gc --minify

      - name: Install lychee
        run: |
          curl -sSfL https://github.com/lycheeverse/lychee/releases/download/v0.18.1/lychee-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz
          sudo mv lychee /usr/local/bin/lychee

      - name: Check links
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(public/**/*.html)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No HTML files found under public/"
            exit 1
          fi
          lychee --no-progress --accept 200,429 --retry-wait-time 2 --max-retries 2 "${files[@]}"
